<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Todo App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="apnatodo.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 position-relative overflow-hidden">

    <!-- Decorative background elements -->
    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>

    <div class="container custom-container p-4 p-md-5">
        <header class="text-center mb-4">
            <h1 class="fw-bold d-flex justify-content-center align-items-center gap-3 header-title mb-2">
                <i class="fa-solid fa-bolt text-warning"></i> Apna Todo
            </h1>
            <p id="stats" class="text-white-50 small mb-0 fw-light">0 pending tasks</p>
        </header>

        <div class="input-group mb-4 shadow-sm rounded-3">
            <input type="text" class="form-control form-control-lg custom-input ps-4"
                placeholder="What's your next move?" id="taskInput" autocomplete="off">
            <button class="btn custom-btn px-4" id="Button" title="Add Task">
                <i class="fa-solid fa-plus fs-5"></i>
            </button>
        </div>

        <ul id="taskList" class="list-group task-list-scroll pe-1">
            <!-- Tasks will be injected here via JavaScript -->
        </ul>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
